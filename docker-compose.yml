version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: simplelocator-postgres
    environment:
      POSTGRES_DB: simplelocator
      POSTGRES_USER: simplelocator
      POSTGRES_PASSWORD: simplelocator123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simplelocator -d simplelocator"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: simplelocator-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@simplelocator.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
