spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/simplelocator
    username: simplelocator
    password: simplelocator123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        # Hibernate 6 (Spring Boot 3) auto-detects PostGIS dialect; explicit override not needed.
        # Uncomment below only if dialect detection fails:
        # dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

logging:
  level:
    com.example.simplelocator: DEBUG
    org.hibernate.SQL: INFO
